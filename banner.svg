<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Ideaflow — Banner</title>
  <desc>Banner do framework Ideaflow com logo e tagline</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="200" fill="#0a0a0a" rx="12"/>

  <line x1="0" y1="50" x2="680" y2="50" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="100" x2="680" y2="100" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="150" x2="680" y2="150" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  <line x1="170" y1="0" x2="170" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  <line x1="340" y1="0" x2="340" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  <line x1="510" y1="0" x2="510" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>

  <g transform="translate(60, 100)">
    <polygon points="0,-36 36,0 0,36 -36,0" fill="none" stroke="#39FF9F" stroke-width="1.5" opacity="0.9"/>
    <polygon points="0,-22 22,0 0,22 -22,0" fill="#39FF9F" opacity="0.12"/>
    <line x1="-14" y1="0" x2="10" y2="0" stroke="#39FF9F" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.9"/>
  </g>

  <text x="118" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">idea</text>
  <text x="240" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="#39FF9F" letter-spacing="-1">flow</text>

  <text x="118" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#ffffff" opacity="0.45" letter-spacing="2">FROM IDEA TO BUSINESS PLAN — AI AGENTS</text>

  <line x1="118" y1="130" x2="560" y2="130" stroke="#39FF9F" stroke-width="0.5" opacity="0.3"/>

  <g font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.5">
    <text x="118" y="152">/agente-ideia</text>
    <text x="118" y="152" dx="95">→</text>
    <text x="118" y="152" dx="110">/pesquisa-mercado</text>
    <text x="118" y="152" dx="218">→</text>
    <text x="118" y="152" dx="233">/agente-estrategia</text>
    <text x="118" y="152" dx="338">→</text>
    <text x="118" y="152" dx="353">/agente-financeiro</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.5">
    <text x="118" y="170">/agente-mvp</text>
    <text x="118" y="170" dx="75">→</text>
    <text x="118" y="170" dx="90">/skill-plano-negocio</text>
    <text x="118" y="170" dx="200">→</text>
    <text x="118" y="170" dx="215" fill="#39FF9F" opacity="0.8">plano-negocio.docx</text>
  </g>

  <rect x="118" y="180" width="80" height="14" rx="7" fill="#39FF9F" opacity="0.15"/>
  <text x="158" y="190" font-family="Arial, sans-serif" font-size="9" fill="#39FF9F" text-anchor="middle" opacity="0.9">OPEN SOURCE</text>

  <rect x="208" y="180" width="80" height="14" rx="7" fill="#ffffff" opacity="0.08"/>
  <text x="248" y="190" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.6">CLAUDE CODE</text>
</svg>
